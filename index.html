<!doctype html>
<title>Todo</title>
<input id=t><button onclick=a()>Add</button>
<ul id=l></ul>
<script>
const u='/api/todos'
const r=async()=>l.innerHTML=(await(await fetch(u)).json()).map((x,i)=>`<li>${x} <button onclick=d(${i})>x</button>`).join('')
const a=async()=>{await fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:t.value})});t.value='';r()}
const d=async i=>{await fetch(u+'/'+i,{method:'DELETE'});r()}
r()
</script>
